name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker images
        run: |
          docker build -t user-service:${{ github.sha }} services/user-service/
          docker build -t api-gateway:${{ github.sha }} services/api-gateway/

      - name: Verify images
        run: docker images | grep -E "user-service|api-gateway"

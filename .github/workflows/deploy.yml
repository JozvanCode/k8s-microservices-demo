name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker images
        run: |
          docker build -t user-service:${{ github.sha }} services/user-service/
          docker build -t api-gateway:${{ github.sha }} services/api-gateway/

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        run: |
          docker tag user-service:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/user-service:${{ github.sha }}
          docker tag api-gateway:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/user-service:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ github.sha }}
